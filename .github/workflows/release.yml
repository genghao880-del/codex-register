name: Tag Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests curl_cffi pywebview

      - name: Build release bundle
        shell: bash
        run: |
          python scripts/build_release_bundle.py --tag "${GITHUB_REF_NAME}" --platform "${{ matrix.platform }}"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: release-artifacts/*.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        run: |
          python scripts/generate_release_notes.py --tag "${GITHUB_REF_NAME}" --out release_notes.md

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          root = Path("release-assets")
          lines = []
          for p in sorted(root.glob("*.zip")):
              h = hashlib.sha256(p.read_bytes()).hexdigest()
              lines.append(f"{h}  {p.name}")
          (root / "SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
            gh release edit "$TAG" --title "$TAG" --notes-file release_notes.md
          else
            gh release create "$TAG" release-assets/* --title "$TAG" --notes-file release_notes.md
          fi
